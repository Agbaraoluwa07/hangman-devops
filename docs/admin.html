<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuessMaster Ads Admin</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #f7f7f7;
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 4px; }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.2);
        }
        h1, h2 { color: #ffd166; }
        form { display: grid; gap: 10px; }
        label { font-size: 0.9rem; color: #e8ebff; }
        input, textarea, select, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.16);
            font: inherit;
        }
        input, textarea, select { background: rgba(255,255,255,0.06); color: white; }
        button {
            cursor: pointer;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            font-weight: 700;
        }
        .inline { display: flex; gap: 8px; align-items: center; }
        .inline input { width: auto; }
        .ad-list { display: grid; gap: 12px; }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .card { padding: 14px; }
            h1 { font-size: 1.35rem; }
            h2 { font-size: 1.1rem; }
            .actions { flex-direction: column; }
        }
        .ad-item {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 12px;
            background: rgba(0,0,0,0.16);
        }
        .muted { color: #a8b2d8; font-size: 0.84rem; }
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .danger { background: #4b1d2e; }
        .status { margin-top: 10px; color: #7ee7a8; }
        .status.error { color: #ff8f8f; }
        .image-preview {
            display: none;
            max-width: 220px;
            max-height: 140px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.16);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>GuessMaster Sponsored Ad Manager</h1>
            <p class="muted">Add ad creatives, links, and monitor clicks from one place.</p>
            <form id="ad-form">
                <label>Title
                    <input type="text" id="title" placeholder="Sponsored" required />
                </label>
                <label>Main text
                    <textarea id="text" rows="2" placeholder="Your next favorite app is waiting." required></textarea>
                </label>
                <label>Subtext
                    <textarea id="subtext" rows="2" placeholder="Ad space for partners and promotions."></textarea>
                </label>
                <label>Destination link
                    <input type="url" id="link" placeholder="https://example.com" required />
                </label>
                <label>Image URL or upload (optional)
                    <input type="url" id="imageUrl" placeholder="https://example.com/image.png" />
                </label>
                <label>Upload image file
                    <input type="file" id="imageFile" accept="image/*" />
                </label>
                <img id="imagePreview" class="image-preview" alt="Ad preview" />
                <label class="inline">
                    <input type="checkbox" id="active" checked />
                    <span>Show this ad in the app</span>
                </label>
                <button type="submit">Save ad</button>
            </form>
            <div id="status" class="status"></div>
        </div>

        <div class="card">
            <h2>Analytics Snapshot</h2>
            <div id="analytics" class="ad-list"></div>
        </div>

        <div class="card">
            <h2>Existing Ads</h2>
            <div id="ad-list" class="ad-list"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('ad-form');
        const list = document.getElementById('ad-list');
        const analytics = document.getElementById('analytics');
        const status = document.getElementById('status');
        const imageFileInput = document.getElementById('imageFile');
        const imageUrlInput = document.getElementById('imageUrl');
        const imagePreview = document.getElementById('imagePreview');
        const STORAGE_KEY = 'guessmaster-admin-data';

        function shouldUseApi() {
            return !window.location.hostname.endsWith('github.io');
        }

        function getStoredState() {
            try {
                const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                return parsed || { ads: [], analytics: { sessions: [], copyEvents: [] }, feedback: [] };
            } catch {
                return { ads: [], analytics: { sessions: [], copyEvents: [] }, feedback: [] };
            }
        }

        function saveStoredState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        async function loadSeedState() {
            try {
                const [adsRes, analyticsRes, feedbackRes] = await Promise.all([
                    fetch('./data/ads.json'),
                    fetch('./data/analytics.json'),
                    fetch('./data/feedback.json')
                ]);
                const nextState = {
                    ads: adsRes.ok ? await adsRes.json() : [],
                    analytics: analyticsRes.ok ? await analyticsRes.json() : { sessions: [], copyEvents: [] },
                    feedback: feedbackRes.ok ? await feedbackRes.json() : []
                };
                saveStoredState(nextState);
                return nextState;
            } catch {
                return { ads: [], analytics: { sessions: [], copyEvents: [] }, feedback: [] };
            }
        }

        async function getAdminState() {
            const current = getStoredState();
            if (current.ads?.length || current.analytics?.sessions?.length || current.feedback?.length) {
                return current;
            }
            return loadSeedState();
        }

        function buildAnalyticsPayload(state) {
            const ads = Array.isArray(state.ads) ? state.ads : [];
            const analytics = state.analytics || { sessions: [], copyEvents: [] };
            const feedback = Array.isArray(state.feedback) ? state.feedback : [];
            const activeAds = ads.filter(ad => ad.active !== false);
            const totalViews = ads.reduce((sum, ad) => sum + (ad.views || 0), 0);
            const totalClicks = ads.reduce((sum, ad) => sum + (ad.clicks || 0), 0);
            const ctr = totalViews > 0 ? Number(((totalClicks / totalViews) * 100).toFixed(2)) : 0;
            const topAd = [...ads].sort((a, b) => (b.clicks || 0) - (a.clicks || 0))[0] || null;
            const recentActivity = [...ads]
                .filter(ad => ad.lastViewedAt || ad.lastClickedAt)
                .map(ad => [
                    ad.lastViewedAt ? { type: 'view', adId: ad.id, adTitle: ad.title, at: ad.lastViewedAt } : null,
                    ad.lastClickedAt ? { type: 'click', adId: ad.id, adTitle: ad.title, at: ad.lastClickedAt } : null
                ])
                .flat()
                .filter(Boolean)
                .sort((a, b) => new Date(b.at) - new Date(a.at))
                .slice(0, 10);

            const userDailySummary = Object.values((analytics.sessions || []).reduce((acc, entry) => {
                const dayKey = entry.day || new Date(entry.at).toISOString().slice(0, 10);
                if (!acc[dayKey]) {
                    acc[dayKey] = { day: dayKey, users: new Set(), totalDurationSeconds: 0, sessions: 0 };
                }
                acc[dayKey].users.add(entry.username || 'anonymous');
                acc[dayKey].totalDurationSeconds += Number(entry.durationSeconds || 0);
                acc[dayKey].sessions += 1;
                return acc;
            }, {})).map(item => ({
                day: item.day,
                uniqueUsers: item.users.size,
                totalDurationSeconds: item.totalDurationSeconds,
                sessions: item.sessions
            })).sort((a, b) => a.day.localeCompare(b.day));

            const dailySummary = Object.values((analytics.sessions || []).reduce((acc, entry) => {
                const dayKey = entry.day || new Date(entry.at).toISOString().slice(0, 10);
                if (!acc[dayKey]) {
                    acc[dayKey] = { day: dayKey, activeUsers: new Set(), totalDurationSeconds: 0, sessions: 0 };
                }
                acc[dayKey].activeUsers.add(entry.username || 'anonymous');
                acc[dayKey].totalDurationSeconds += Number(entry.durationSeconds || 0);
                acc[dayKey].sessions += 1;
                return acc;
            }, {})).map(item => ({
                day: item.day,
                activeUsers: item.activeUsers.size,
                totalDurationSeconds: item.totalDurationSeconds,
                sessions: item.sessions
            })).sort((a, b) => a.day.localeCompare(b.day));

            return {
                totalAds: ads.length,
                activeAds: activeAds.length,
                totalViews,
                totalClicks,
                ctr,
                topAd: topAd ? { id: topAd.id, title: topAd.title, clicks: topAd.clicks || 0, views: topAd.views || 0 } : null,
                recentActivity,
                userDailySummary,
                dailySummary,
                copyEventsCount: (analytics.copyEvents || []).length,
                feedbackCount: feedback.length,
                feedbackItems: feedback.slice(-10).reverse()
            };
        }

        function showImagePreview(src) {
            if (!src) {
                imagePreview.style.display = 'none';
                imagePreview.removeAttribute('src');
                return;
            }
            imagePreview.src = src;
            imagePreview.style.display = 'block';
        }

        imageFileInput.addEventListener('change', async () => {
            const file = imageFileInput.files[0];
            if (!file) {
                showImagePreview('');
                return;
            }
            const reader = new FileReader();
            reader.onload = () => showImagePreview(reader.result);
            reader.readAsDataURL(file);
        });

        imageUrlInput.addEventListener('input', () => {
            if (imageUrlInput.value.trim()) {
                showImagePreview(imageUrlInput.value.trim());
            } else {
                showImagePreview('');
            }
        });

        async function loadAnalytics() {
            try {
                if (shouldUseApi()) {
                    const res = await fetch('/api/analytics');
                    const data = await res.json();
                    analytics.innerHTML = `
                        <div class="ad-item">
                            <strong>Overview</strong>
                            <p class="muted">Active ads: ${data.activeAds || 0}</p>
                            <p class="muted">Total views: ${data.totalViews || 0}</p>
                            <p class="muted">Total clicks: ${data.totalClicks || 0}</p>
                            <p class="muted">CTR: ${data.ctr || 0}%</p>
                            <p class="muted">Top ad: ${data.topAd ? data.topAd.title : 'None yet'}</p>
                        </div>
                        <div class="ad-item">
                            <strong>User sessions</strong>
                            ${data.dailySummary && data.dailySummary.length ? data.dailySummary.map(item => `<p class="muted">${item.day} • ${item.activeUsers} active users • ${item.totalDurationSeconds}s total</p>`).join('') : '<p class="muted">No session data yet.</p>'}
                        </div>
                        <div class="ad-item">
                            <strong>Per-user activity</strong>
                            ${data.userDailySummary && data.userDailySummary.length ? data.userDailySummary.map(item => `<p class="muted">${item.day} • ${item.uniqueUsers} users • ${item.totalDurationSeconds}s total</p>`).join('') : '<p class="muted">No per-user data yet.</p>'}
                        </div>
                        <div class="ad-item">
                            <strong>Donation & feedback</strong>
                            <p class="muted">Crypto addresses copied: ${data.copyEventsCount || 0}</p>
                            <p class="muted">Feedback messages: ${data.feedbackCount || 0}</p>
                            ${data.feedbackItems && data.feedbackItems.length ? data.feedbackItems.map(item => `<p class="muted">${item.username} • ${item.message} • ${new Date(item.at).toLocaleString()}</p>`).join('') : '<p class="muted">No feedback yet.</p>'}
                        </div>
                        <div class="ad-item">
                            <strong>Recent activity</strong>
                            ${data.recentActivity && data.recentActivity.length ? data.recentActivity.map(item => `<p class="muted">${item.type.toUpperCase()} • ${item.adTitle} • ${new Date(item.at).toLocaleString()}</p>`).join('') : '<p class="muted">No activity yet.</p>'}
                        </div>
                    `;
                    return;
                }

                const state = await getAdminState();
                const data = buildAnalyticsPayload(state);
                analytics.innerHTML = `
                    <div class="ad-item">
                        <strong>Overview</strong>
                        <p class="muted">Active ads: ${data.activeAds || 0}</p>
                        <p class="muted">Total views: ${data.totalViews || 0}</p>
                        <p class="muted">Total clicks: ${data.totalClicks || 0}</p>
                        <p class="muted">CTR: ${data.ctr || 0}%</p>
                        <p class="muted">Top ad: ${data.topAd ? data.topAd.title : 'None yet'}</p>
                    </div>
                    <div class="ad-item">
                        <strong>User sessions</strong>
                        ${data.dailySummary && data.dailySummary.length ? data.dailySummary.map(item => `<p class="muted">${item.day} • ${item.activeUsers} active users • ${item.totalDurationSeconds}s total</p>`).join('') : '<p class="muted">No session data yet.</p>'}
                    </div>
                    <div class="ad-item">
                        <strong>Per-user activity</strong>
                        ${data.userDailySummary && data.userDailySummary.length ? data.userDailySummary.map(item => `<p class="muted">${item.day} • ${item.uniqueUsers} users • ${item.totalDurationSeconds}s total</p>`).join('') : '<p class="muted">No per-user data yet.</p>'}
                    </div>
                    <div class="ad-item">
                        <strong>Donation & feedback</strong>
                        <p class="muted">Crypto addresses copied: ${data.copyEventsCount || 0}</p>
                        <p class="muted">Feedback messages: ${data.feedbackCount || 0}</p>
                        ${data.feedbackItems && data.feedbackItems.length ? data.feedbackItems.map(item => `<p class="muted">${item.username} • ${item.message} • ${new Date(item.at).toLocaleString()}</p>`).join('') : '<p class="muted">No feedback yet.</p>'}
                    </div>
                    <div class="ad-item">
                        <strong>Recent activity</strong>
                        ${data.recentActivity && data.recentActivity.length ? data.recentActivity.map(item => `<p class="muted">${item.type.toUpperCase()} • ${item.adTitle} • ${new Date(item.at).toLocaleString()}</p>`).join('') : '<p class="muted">No activity yet.</p>'}
                    </div>
                `;
            } catch (error) {
                analytics.innerHTML = `<p class="muted">Unable to load analytics right now. ${error.message}</p>`;
            }
        }

        async function loadAds() {
            try {
                if (shouldUseApi()) {
                    const res = await fetch('/api/ads?all=1');
                    const ads = await res.json();
                    list.innerHTML = '';
                    if (!ads.length) {
                        list.innerHTML = '<p class="muted">No ads yet.</p>';
                        return;
                    }

                    ads.forEach(ad => {
                        const item = document.createElement('div');
                        item.className = 'ad-item';
                        item.innerHTML = `
                            <strong>${ad.title}</strong>
                            <p>${ad.text}</p>
                            <p class="muted">${ad.subtext || ''}</p>
                            <p class="muted">Link: <a href="${ad.link}" target="_blank" rel="noopener noreferrer" style="color:#ffd166">${ad.link}</a></p>
                            ${ad.imageUrl ? `<p class="muted">Image: <a href="${ad.imageUrl}" target="_blank" rel="noopener noreferrer" style="color:#ffd166">${ad.imageUrl}</a></p>` : ''}
                            <p class="muted">Status: ${ad.active === false ? 'Hidden' : 'Live'} • Views: ${ad.views || 0} • Clicks: ${ad.clicks || 0}</p>
                            <div class="actions">
                                <button class="danger" data-delete="${ad.id}">Delete</button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                    return;
                }

                const state = await getAdminState();
                const ads = Array.isArray(state.ads) ? state.ads : [];
                list.innerHTML = '';
                if (!ads.length) {
                    list.innerHTML = '<p class="muted">No ads yet.</p>';
                    return;
                }

                ads.forEach(ad => {
                    const item = document.createElement('div');
                    item.className = 'ad-item';
                    item.innerHTML = `
                        <strong>${ad.title}</strong>
                        <p>${ad.text}</p>
                        <p class="muted">${ad.subtext || ''}</p>
                        <p class="muted">Link: <a href="${ad.link}" target="_blank" rel="noopener noreferrer" style="color:#ffd166">${ad.link}</a></p>
                        ${ad.imageUrl ? `<p class="muted">Image: <a href="${ad.imageUrl}" target="_blank" rel="noopener noreferrer" style="color:#ffd166">${ad.imageUrl}</a></p>` : ''}
                        <p class="muted">Status: ${ad.active === false ? 'Hidden' : 'Live'} • Views: ${ad.views || 0} • Clicks: ${ad.clicks || 0}</p>
                        <div class="actions">
                            <button class="danger" data-delete="${ad.id}">Delete</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                list.innerHTML = `<p class="muted">Unable to load ads right now. ${error.message}</p>`;
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            status.className = 'status';
            status.textContent = 'Saving...';

            let imageValue = imageUrlInput.value.trim();
            const file = imageFileInput.files[0];
            if (file) {
                const reader = new FileReader();
                imageValue = await new Promise((resolve, reject) => {
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            const payload = {
                title: document.getElementById('title').value.trim(),
                text: document.getElementById('text').value.trim(),
                subtext: document.getElementById('subtext').value.trim(),
                link: document.getElementById('link').value.trim(),
                imageUrl: imageValue,
                active: document.getElementById('active').checked
            };

            if (shouldUseApi()) {
                const res = await fetch('/api/ads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) {
                    status.className = 'status error';
                    status.textContent = result.error || 'Could not save ad';
                    return;
                }
            } else {
                const state = await getAdminState();
                const ad = {
                    id: `ad-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    title: payload.title,
                    text: payload.text,
                    subtext: payload.subtext,
                    link: payload.link,
                    imageUrl: payload.imageUrl,
                    active: payload.active,
                    views: 0,
                    clicks: 0,
                    createdAt: new Date().toISOString(),
                    lastViewedAt: null,
                    lastClickedAt: null
                };
                state.ads = Array.isArray(state.ads) ? [...state.ads, ad] : [ad];
                saveStoredState(state);
            }

            form.reset();
            imageFileInput.value = '';
            showImagePreview('');
            document.getElementById('active').checked = true;
            status.textContent = 'Ad saved successfully.';
            loadAnalytics();
            loadAds();
        });

        ['title', 'text', 'link'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (status.textContent === 'Saving...') return;
                status.className = 'status';
                status.textContent = '';
            });
        });

        list.addEventListener('click', async (event) => {
            const button = event.target.closest('[data-delete]');
            if (!button) return;
            const id = button.getAttribute('data-delete');
            if (shouldUseApi()) {
                const res = await fetch(`/api/ads/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadAnalytics();
                    loadAds();
                }
                return;
            }

            const state = await getAdminState();
            state.ads = (state.ads || []).filter(ad => ad.id !== id);
            saveStoredState(state);
            loadAnalytics();
            loadAds();
        });

        loadAnalytics();
        loadAds();
    </script>
</body>
</html>
